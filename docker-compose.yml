services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      # L'UI va chercher l'API sur le nom de service "api" dans le réseau Docker
      API_URL: "http://api:8000/predict"
    depends_on:
      - api